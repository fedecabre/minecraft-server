version: '3.8'

services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    command:
      - --entrypoints.minecraft.address=:25565
      - --entrypoints.websecure.address=:443
      - --providers.docker=true
      - --api.dashboard=true
      - --certificatesresolvers.myresolver.acme.tlschallenge=true
      - --certificatesresolvers.myresolver.acme.email=${EMAIL}
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
    ports:
      - "443:443"
      - "25565:25565"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`${DOMAIN_TRAEFIK}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=myresolver"
      - "traefik.http.routers.traefik.service=api@internal"

  velocity:
    image: endkind/velocity:latest
    container_name: velocity
    environment:
      MIN_RAM: "128M"
      MAX_RAM: "256M"
    volumes:
      - ./velocity.toml:/data/velocity.toml
    restart: unless-stopped
    depends_on:
      - minecraft
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    labels:
      - "traefik.enable=true"
      - "traefik.tcp.routers.velocity.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.velocity.entrypoints=minecraft"
      - "traefik.tcp.routers.velocity.service=velocity"
      - "traefik.tcp.services.velocity.loadbalancer.server.port=25565"

  minecraft:
    image: itzg/minecraft-server
    container_name: minecraft
    environment:
      EULA: "TRUE"
      VERSION: "LATEST"
      MEMORY: "4G"
      ONLINE_MODE: "TRUE"
      SERVER_NAME: "${MCADMIN_SERVER_NAME}"
      TYPE: "PAPER"
      PORT: "25566"
    volumes:
      - ./minecraft-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc-health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'

